name: Deploy to gh-pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /kedai1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build and export static site
        run: npm run build

      - name: Create .nojekyll
        run: mkdir -p out && touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          keep_files: true
          allow_empty_commit: false
          commit_message: "Deploy site to gh-pages from ${{ github.sha }}"

      - name: Create version tag
        id: create_tag
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved version tag: $tag"
          if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.create_tag.outputs.TAG }}
          name: Release ${{ steps.create_tag.outputs.TAG }}
          body: "Release ${{ steps.create_tag.outputs.TAG }}"
          draft: false
          prerelease: false
